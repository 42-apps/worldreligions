<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="core"><circle cx="128" cy="128" r="96"/></clipPath>
    <radialGradient id="sheen" cx="36%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="66%" cy="72%" r="74%">
      <stop offset="52%" stop-color="#02030a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#02030a" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- faith-spectrum disc: the palette as longitude gores on a glossy sphere, on transparency -->
  <g clip-path="url(#core)">
    <rect x="32"    y="30" width="27.5" height="196" fill="#7B4FA3"/>
    <rect x="59.5"  y="30" width="27.5" height="196" fill="#2F6FE0"/>
    <rect x="87"    y="30" width="27.5" height="196" fill="#2FA84F"/>
    <rect x="114.5" y="30" width="27.5" height="196" fill="#F2A93B"/>
    <rect x="142"   y="30" width="27.5" height="196" fill="#E0561F"/>
    <rect x="169.5" y="30" width="27.5" height="196" fill="#C0392B"/>
    <rect x="197"   y="30" width="27.5" height="196" fill="#5E8BA0"/>
    <circle cx="128" cy="128" r="96" fill="url(#shade)"/>
    <circle cx="128" cy="128" r="96" fill="url(#sheen)"/>
  </g>
  <circle cx="128" cy="128" r="96" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3.5"/>
</svg>
